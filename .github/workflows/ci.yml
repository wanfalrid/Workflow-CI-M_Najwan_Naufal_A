name: ML Training CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Number of trees"
        required: false
        default: "100"
      max_depth:
        description: "Max tree depth (0=None)"
        required: false
        default: "10"

env:
  PYTHON_VERSION: "3.10"
  DOCKER_IMAGE: "najwanopal/wine-quality-mlops"

jobs:
  # ════════════════════════════════════════════════════════════════
  #  Job 1: Lint & Validate
  # ════════════════════════════════════════════════════════════════
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: pip install flake8

      - name: Lint modelling.py
        run: flake8 MLProject/modelling.py --max-line-length=120 --ignore=E501,W503

      - name: Validate MLProject file
        run: |
          echo "=== MLProject ==="
          cat MLProject/MLProject
          echo ""
          echo "=== Checking required files ==="
          test -f MLProject/MLProject && echo "✅ MLProject"
          test -f MLProject/modelling.py && echo "✅ modelling.py"
          test -f MLProject/conda.yaml && echo "✅ conda.yaml"
          test -d MLProject/winequality_preprocessing && echo "✅ winequality_preprocessing/"

  # ════════════════════════════════════════════════════════════════
  #  Job 2: Train Model
  # ════════════════════════════════════════════════════════════════
  train:
    name: Train Model
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('MLProject/conda.yaml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow matplotlib seaborn joblib optuna

      - name: Run training
        working-directory: MLProject
        env:
          MLFLOW_TRACKING_URI: "file:///tmp/mlruns"
        run: |
          python modelling.py \
            --data-dir winequality_preprocessing \
            --n-estimators ${{ github.event.inputs.n_estimators || '100' }} \
            --max-depth ${{ github.event.inputs.max_depth || '10' }} \
            --random-state 42 \
            --experiment-name wine-quality-classification

      - name: Verify outputs
        working-directory: MLProject
        run: |
          echo "=== Checking artifacts ==="
          ls -la artifacts/ || echo "No artifacts dir"
          ls -la models/ || echo "No models dir"
          echo ""
          echo "=== Model metadata ==="
          cat models/metadata.json

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts-${{ github.run_number }}
          path: |
            MLProject/artifacts/
            MLProject/models/
          retention-days: 14

      - name: Upload MLflow runs
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs-${{ github.run_number }}
          path: /tmp/mlruns/
          retention-days: 7

  # ════════════════════════════════════════════════════════════════
  #  Job 3: Build & Push Docker Image
  # ════════════════════════════════════════════════════════════════
  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: train
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Image Summary
        run: |
          echo "### 🐳 Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_IMAGE }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  #  Job 4: Create Issue on Failure
  # ════════════════════════════════════════════════════════════════
  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, train]
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 CI Pipeline Failed — Run #${context.runNumber}`,
              body: `## CI Pipeline Failure\n\n**Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n**Trigger:** \`${context.eventName}\`\n**Branch:** \`${context.ref}\`\n\nPlease check the logs.`,
              labels: ['bug', 'ci']
            });
